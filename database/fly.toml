app = 'your-app-db'
primary_region = 'iad'

[build]
  dockerfile = 'dockerfile'

[env]
  MARIADB_DATABASE = 'internetdj'

[[mounts]]
  source = 'mariadb_data'
  destination = '/var/lib/mysql'

[[services]]
  protocol = 'tcp'
  internal_port = 3306
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[services.ports]]
  port = 3306
  handlers = ['tls']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
